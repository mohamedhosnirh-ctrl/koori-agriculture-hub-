<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>koori — Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Fredoka+One&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="products.css">
</head>
<body>

<!-- ══ NAVBAR ══ -->
<header>
  <nav class="navbar">
    <a href="main.html" class="koori-logo">
      <span class="kl">k</span><span class="kl">o</span><span class="kl">o</span><span class="kl">r</span><span class="kl">i</span>
    </a>
<div class="search-box">
  <input type="text" placeholder="Search products…" id="navSearch"/>
  <button type="reset"></button>
</div>
    <ul class="nav-links">
      <li><a href="main.html">Home</a></li>
      <li><a href="products.html" class="active">Products</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="#" id="addItemLink">Add Item</a></li>
      <li><a href="cart.html">Cart <span id="cartCount" style="display:none;background:var(--gold);color:var(--brown-dark);font-size:.7rem;font-weight:700;border-radius:99px;padding:1px 6px;margin-left:2px;vertical-align:middle;"></span></a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <a href="login.html" class="login-btn">Login</a>
    <div class="language-switcher">
      <select id="languageSelect" onchange="switchLang(this.value)">
        <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="ar">AR</option>
        <option value="it">IT</option>
      </select>
    </div>
  </nav>
</header>

<!-- ══ PAGE HERO ══ -->
<section class="page-hero">
  <h1>🌾 All Products</h1>
  <p>Fresh from the farm — browse, filter, and order in seconds</p>
</section>

<!-- ══ CATEGORY BUTTONS ══ -->
<div class="cat-bar">
  <button class="cat-btn active" data-cat="all" onclick="selectCatBar(this,'all')">
    <span class="cat-btn-emoji">🌿</span> All
  </button>
  <button class="cat-btn" data-cat="Vegetables" onclick="selectCatBar(this,'Vegetables')">
    <span class="cat-btn-emoji">🥦</span> Vegetables
  </button>
  <button class="cat-btn" data-cat="Fruits" onclick="selectCatBar(this,'Fruits')">
    <span class="cat-btn-emoji">🍎</span> Fruits
  </button>
  <button class="cat-btn" data-cat="Grains" onclick="selectCatBar(this,'Grains')">
    <span class="cat-btn-emoji">🌾</span> Grains
  </button>
  <button class="cat-btn" data-cat="Dairy" onclick="selectCatBar(this,'Dairy')">
    <span class="cat-btn-emoji">🥛</span> Dairy
  </button>
  <button class="cat-btn" data-cat="Herbs" onclick="selectCatBar(this,'Herbs')">
    <span class="cat-btn-emoji">🌱</span> Herbs
  </button>
  <button class="cat-btn" data-cat="Honey" onclick="selectCatBar(this,'Honey')">
    <span class="cat-btn-emoji">🍯</span> Honey
  </button>
  <button class="cat-btn" data-cat="Livestock" onclick="selectCatBar(this,'Livestock')">
    <span class="cat-btn-emoji">🐄</span> Livestock
  </button>
  <button class="cat-btn" data-cat="Equipment" onclick="selectCatBar(this,'Equipment')">
    <span class="cat-btn-emoji">🚜</span> Equipment
  </button>
  <button class="cat-btn" data-cat="Other" onclick="selectCatBar(this,'Other')">
    <span class="cat-btn-emoji">📦</span> Other
  </button>
</div>

<!-- ══ TOOLBAR ══ -->
<div class="toolbar">
  <div class="toolbar-search">
    <input type="text" id="searchInput" placeholder="Search by name or description…"/>
    <button onclick="renderList()" class="bts">Search</button>
  </div>
  <select class="sort-select" id="sortSelect" onchange="renderList()">
    <option value="default">Sort: Default</option>
    <option value="price-asc">Price: Low → High</option>
    <option value="price-desc">Price: High → Low</option>
    <option value="name-asc">Name: A → Z</option>
    <option value="name-desc">Name: Z → A</option>
    <option value="newest">Newest First</option>
  </select>
  <span class="result-count" id="resultCount"></span>
</div>

<!-- ══ MAIN LAYOUT ══ -->
<div class="products-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-box">
      <h3>🔍 Filters</h3>
      <div class="filter-group">
        <h4>Category</h4>
        <div class="filter-pills" id="catPills"></div>
      </div>
      <div class="filter-group">
        <h4>Price (DZD)</h4>
        <div class="price-range">
          <div class="price-inputs">
            <input type="number" id="priceMin" placeholder="Min" min="0"/>
            <span>–</span>
            <input type="number" id="priceMax" placeholder="Max" min="0"/>
          </div>
          <button class="apply-price" onclick="renderList()">Apply</button>
        </div>
      </div>
      <div class="filter-group">
        <h4>Tags</h4>
        <div class="badge-filters" id="badgePills"></div>
      </div>
      <button class="clear-filters" onclick="clearFilters()">✕ Clear all filters</button>
    </div>
  </aside>

  <!-- LIST -->
  <div class="grid-area" id="gridArea">
    <!-- filled by JS -->
  </div>

</div>

<!-- ══ FOOTER ══ -->
<footer class="footer">
  <div class="footer-bottom">
    <p>© 2026 koori. All rights reserved.</p>
  </div>
</footer>

<div class="cart-toast" id="cartToast"></div>
<script src="products.js"></script>
</body>
</html>
